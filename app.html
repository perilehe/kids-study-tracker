<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Kids Study Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23F97316'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-weight='bold' font-family='Arial'%3EK%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23F97316'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-weight='bold' font-family='Arial'%3EK%3C/text%3E%3C/svg%3E">
<meta property="og:title" content="Kids Study Tracker">
<meta property="og:description" content="Track study missions, earn XP, and unlock rewards!">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F0F1F5;--card:#FFF;--border:#E2E4EA;--text:#1E1F2E;--text2:#64748B;--text3:#94A3B8;--accent:#F97316;--accent2:#EAB308;--c1:#3B82F6;--c2:#8B5CF6;--c3:#F97316;--c4:#EAB308;--c5:#F43F5E;--c6:#10B981;--earned:#3B82F6;--spent:#F43F5E}
html,body{height:100%;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);overflow:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input,textarea,select,button{font-family:inherit}

.topnav{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.deck-btn{font-size:10px;font-weight:800;padding:7px 16px;border-radius:8px;border:2px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .2s;letter-spacing:.04em}
.deck-btn.active{background:var(--text);color:#FFF;border-color:var(--text)}
.topnav-spacer{flex:1}
.xp-box{display:flex;gap:6px;align-items:center}
.xp-stat{text-align:left;background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:8px;min-width:60px}
.xp-sl{font-size:7px;color:var(--text3);font-weight:700;letter-spacing:.06em}
.xp-sv{font-size:13px;font-weight:800}
.sync-dot{width:8px;height:8px;border-radius:50%;margin-left:6px;display:inline-block}
.sync-ok{background:var(--c6)}.sync-err{background:var(--c5)}.sync-ing{background:var(--accent2);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stbl{width:100%;border-collapse:collapse;font-size:11px;font-weight:700}
.stbl th{font-size:8px;color:var(--text3);font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:8px 6px;border-bottom:2px solid var(--border);text-align:right;white-space:nowrap}
.stbl th:first-child{text-align:left}
.stbl td{padding:7px 6px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.stbl td:first-child{text-align:left}
.stbl tr:last-child td{border-bottom:none}
.stbl tr.row-today td{background:rgba(59,130,246,0.05);font-weight:800}
.stbl tr.row-future td{color:var(--text3);opacity:.4}
.stbl .val-pos{color:var(--c1)}.stbl .val-neg{color:var(--spent)}

.main{flex:1;display:flex;overflow:hidden;position:relative}
.page-group{display:none;width:100%;height:100%;background:var(--card);flex-direction:column}.page-group.active{display:flex}
.ap{overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;min-width:0}
.ap-tab{width:48px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;padding:16px 0;gap:8px;transition:background .2s}
.ap-tab:hover{background:var(--bg)}
.ap-tab-num{font-size:14px;font-weight:800;color:var(--text3)}
.ap-tab-title{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;flex:1;text-align:center}
.ap-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ap-content{flex:1;overflow-y:auto;padding:20px;min-width:0;background:var(--card);display:none}
.ap-content.active{display:block}
@media(min-width:768px){.ap{flex-direction:row}.ap.collapsed{width:56px!important;min-width:56px;z-index:2}.ap.collapsed .ap-content{display:none!important}.ap.expanded{flex:1;min-width:0;z-index:1}.ap-tab{width:56px}.mob-tabs{display:none!important}}
@media(max-width:767px){.ap.collapsed{height:0;min-height:0}.ap.collapsed .ap-tab{display:none}.ap.expanded{flex:1;min-height:0}.ap.expanded .ap-tab{display:none}.ap.expanded .ap-content{display:block}.ap{flex-direction:column!important}.mob-tabs{display:flex!important;gap:4px;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}.mob-tab{flex:1;padding:7px;text-align:center;font-size:9px;font-weight:800;border-radius:6px;cursor:pointer;color:var(--text3);background:var(--bg)}.mob-tab.active{background:var(--text);color:#FFF}}

.folder-tabs{display:flex;align-items:flex-end;padding:12px 16px 0;background:var(--bg);flex-shrink:0;position:relative}
.folder-tabs::after{content:'';flex:1;height:3px;background:var(--border);align-self:flex-end;margin-bottom:0}
.folder-tab{padding:7px 18px 6px;font-size:10px;font-weight:800;cursor:pointer;color:var(--text3);background:var(--bg);border:1.5px solid var(--border);border-bottom:none;position:relative;margin-right:-5px;border-radius:7px 7px 0 0;transition:all .18s;letter-spacing:.05em;line-height:1.3;z-index:1}
.folder-tab:hover{color:var(--text2);background:#E8E9F0}
.folder-tab.ft-active{background:var(--text);color:#FFF;border-color:var(--text);z-index:3;padding-bottom:8px;margin-right:-5px;border-radius:8px 8px 0 0}
.folder-tab.ft-active::after{content:'';position:absolute;bottom:-2px;left:-2px;right:-2px;height:5px;background:var(--text);border-radius:0 0 3px 3px}
.folder-tab:not(.ft-active){top:4px}
.tab-content{display:none;flex:1;overflow-y:auto;padding:16px;min-width:0;min-height:0;background:var(--card);border-top:3px solid var(--text);margin-top:-1px}
.tab-content.active{display:block}

.botnav{display:none;background:var(--card);border-top:1px solid var(--border);padding:8px 0;flex-shrink:0}
@media(max-width:767px){.botnav{display:flex}.deck-buttons{display:none}.xp-box{margin-left:0}.xp-stat{min-width:55px;padding:4px 8px}.xp-sv{font-size:11px}}
.bni{flex:1;text-align:center;padding:8px;cursor:pointer}.bnl{font-size:11px;font-weight:700;color:var(--text3);transition:color .2s}
.bni.active .bnl{color:var(--accent);font-weight:800}

.preset{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.preset:active{transform:scale(.98)}
@media(min-width:768px){.preset-acts{opacity:0!important}.preset:hover .preset-acts{opacity:1!important}}
.cb{width:10px;border-radius:3px;flex-shrink:0}
.en{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.st2{font-size:9px;color:var(--text3)}
.xpt{font-size:11px;font-weight:800;color:var(--accent2);min-width:32px;text-align:right}
.fbar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.fbtn{font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer;transition:all .2s}
.fbtn.active{background:var(--text);color:#FFF;border-color:var(--text)}
.pcard{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.prow{display:flex;gap:10px;margin-top:10px}
.pbox{flex:1}.plbl{font-size:8px;color:var(--text3);font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.pctrl{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pbtn{padding:6px 10px;font-size:11px;font-weight:700;color:var(--text2);background:0;border:none;cursor:pointer}
.pval{flex:1;text-align:center;font-size:13px;font-weight:800;color:var(--text);background:0;border:none;font-family:inherit}.pval:focus{outline:0}
.pfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;background:var(--card);padding:8px 12px;border-radius:8px;border:1px solid var(--border)}
.btn{padding:12px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;border:none;transition:all .2s;letter-spacing:.04em;width:100%;text-align:center}
.btn:active{transform:scale(.97)}.bp{background:var(--accent);color:#FFF}
.bs{background:var(--bg);color:var(--text2);border:1px solid var(--border);margin-top:8px}
.bg{font-size:11px;padding:10px;border-radius:8px;font-weight:800;cursor:pointer;border:none;color:#FFF}.bg:active{filter:brightness(.9)}
.bsm{width:auto;padding:8px 16px;font-size:10px}
.ig{margin-bottom:14px}.il{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:6px;display:block;letter-spacing:.04em}
.if{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text)}.if:focus{outline:0;border-color:var(--accent)}
textarea.if{resize:vertical;min-height:70px}
.ght{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.gdot{width:8px;height:8px;border-radius:50%}
.emp{text-align:center;padding:32px 16px;color:var(--text3);font-size:11px;font-weight:700}.emps{font-size:9px;font-weight:400;margin-top:6px;display:block}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}.mfoot{display:flex;align-items:center;gap:8px;margin-top:10px}
.ccard{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;opacity:.5}
.tbtn{flex:1;padding:6px 2px;border-radius:8px;background:var(--bg);color:var(--text3);font-size:11px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px}.tbtn svg{display:block;margin:0 auto}
.tbtn.sel{background:var(--accent);color:#FFF}
.rshop{border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.rbtn{background:rgba(255,255,255,.25);color:#FFF;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}.rbtn:disabled{opacity:.4;cursor:not-allowed}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.srow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.srow:last-child{border-bottom:0}
.rsec{border-radius:12px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between}
.rinv{border-radius:10px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.cbox{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.ctitle{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.08em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.cpick{display:flex;gap:8px;flex-wrap:wrap}
.cswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}.cswatch.sel{border-color:var(--text);transform:scale(1.1)}
.citem{display:flex;align-items:center;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:6px;cursor:pointer}
.citem input{width:18px;height:18px;margin-right:10px;accent-color:var(--accent)}
.hudov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:20px}.hudov.on{display:flex}
.hudbx{background:var(--card);border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.hudt{font-size:12px;font-weight:800;letter-spacing:.08em;margin-bottom:12px}.hudm{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:16px}
.huda{display:flex;gap:8px}.huda .btn{flex:1;margin:0}
.sucov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(240,241,245,.95);z-index:9998;align-items:center;justify-content:center;flex-direction:column}.sucov.on{display:flex}
.pbar{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;cursor:pointer}
.pav{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#FFF;overflow:hidden;flex-shrink:0}.pav img{width:100%;height:100%;object-fit:cover}
.pbwrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.pbh{display:flex;justify-content:space-between;margin-bottom:8px}.pbt{font-size:12px;font-weight:700}.pbv{font-size:12px;font-weight:800;color:var(--accent)}
.pbtrk{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}.pbfill{height:100%;background:linear-gradient(90deg,var(--c6),var(--accent2));border-radius:4px;transition:width .5s}

/* STATS */
.stats-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:12px}
.stats-metrics{display:flex;gap:24px}
.stats-metric-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.stats-metric-val{font-size:20px;font-weight:800;display:flex;align-items:center;gap:6px}
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.view-btn{font-size:10px;font-weight:800;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;letter-spacing:.04em}
.view-btn.active{background:var(--accent);color:#FFF}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:767px){.stats-grid{grid-template-columns:1fr}}
.stats-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.stats-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.stats-panel-title{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.stats-panel-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.ledger-list{flex:1;overflow-y:auto;max-height:300px}
.ledger-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .2s}.ledger-item:last-child{border-bottom:0}.ledger-item:hover{background:var(--bg)}
.ledger-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ledger-name{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.ledger-time{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.04em}
.ledger-amt{font-size:14px;font-weight:800}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:180px;padding:16px 0 0 30px;border-bottom:1px solid var(--border);position:relative;overflow:visible}
.bar-chart-yaxis{position:absolute;left:0;top:10px;bottom:0;width:28px;display:flex;flex-direction:column;justify-content:space-between;font-size:8px;color:var(--text3);font-weight:700;text-align:right;padding-right:4px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar-pair{display:flex;align-items:flex-end;gap:2px;width:100%;justify-content:center}
.bar{width:100%;max-width:18px;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}.bar-label{font-size:8px;color:var(--text3);font-weight:700;margin-top:2px}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-top:8px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}.legend-label{font-size:9px;font-weight:700;letter-spacing:.04em}
.area-canvas{width:100%;height:140px}
.refund-btn{background:rgba(255,255,255,.15);color:#FFF;border:none;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;margin-left:6px}.refund-btn:hover{background:rgba(255,255,255,.3)}

/* WHEEL */
.wheel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:10000;align-items:center;justify-content:center}
.wheel-overlay.on{display:flex}
.wheel-box{background:var(--card);border-radius:20px;padding:24px;text-align:center;max-width:340px;width:90%}
.wheel-title{font-size:14px;font-weight:800;margin-bottom:16px;letter-spacing:.06em}
.wheel-container{position:relative;width:260px;height:260px;margin:0 auto}
.wheel-pointer{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:20px solid var(--accent);filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.wheel-canvas{border-radius:50%;box-shadow:0 0 20px rgba(0,0,0,.3)}
.wheel-result{font-size:16px;font-weight:800;margin-top:12px;min-height:24px}
.wheel-spin-btn{margin-top:16px;padding:12px 40px;border-radius:12px;background:var(--accent);color:#FFF;border:none;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.06em}
.wheel-spin-btn:disabled{opacity:.4;cursor:not-allowed}
.wheel-spin-btn:active{transform:scale(.97)}
.wheel-close{margin-top:8px;padding:8px 20px;border-radius:8px;background:var(--bg);color:var(--text2);border:1px solid var(--border);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh">

<div class="topnav">
  <div class="xp-box">
    <div class="xp-stat"><div class="xp-sl">EARNED</div><div class="xp-sv" id="xp-earned" style="color:var(--c1)">0 XP</div></div>
    <div class="xp-stat"><div class="xp-sl">SPENT</div><div class="xp-sv" id="xp-spent" style="color:var(--spent)">0 XP</div></div>
    <div class="xp-stat"><div class="xp-sl">BALANCE</div><div class="xp-sv" id="xp-balance" style="color:var(--c6)">0 XP</div></div>
    <span class="sync-dot sync-ing" id="sync-dot"></span>
  </div>
  <div class="topnav-spacer"></div>
  <div class="deck-buttons">
    <button class="deck-btn active" onclick="goPage('planner',this)">PLANNER</button>
    <button class="deck-btn" onclick="goPage('rewards',this)">REWARDS</button>
    <button class="deck-btn" onclick="goPage('stats',this)">STATS</button>
    <button class="deck-btn" onclick="goPage('settings',this)">SETTINGS</button>
  </div>
</div>

<div class="main">
<div class="page-group active" id="pg-planner">
  <div class="folder-tabs"><div class="folder-tab ft-active" onclick="topSwitch('planner',1,this)">01 PRESETS</div><div class="folder-tab" onclick="topSwitch('planner',2,this)">02 PLANNING</div><div class="folder-tab" onclick="topSwitch('planner',3,this)">03 MISSIONS</div></div>
  <div class="tab-content active" id="ac-p1"></div>
  <div class="tab-content" id="ac-p2"></div>
  <div class="tab-content" id="ac-p3"></div>
</div>
<div class="page-group" id="pg-rewards">
  <div class="folder-tabs"><div class="folder-tab ft-active" onclick="topSwitch('rewards',1,this)">01 VAULT</div><div class="folder-tab" onclick="topSwitch('rewards',2,this)">02 SHOP</div><div class="folder-tab" onclick="topSwitch('rewards',3,this)">03 INVENTORY</div></div>
  <div class="tab-content active" id="ac-r1"></div>
  <div class="tab-content" id="ac-r2"></div>
  <div class="tab-content" id="ac-r3"></div>

function snd(freqs,type,dur){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();var now=actx.currentTime;for(var i=0;i<freqs.length;i++){var o=actx.createOscillator(),g=actx.createGain();o.type=type||"sine";o.frequency.setValueAtTime(freqs[i],now+i*0.08);g.gain.setValueAtTime(0.12,now+i*0.08);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.08+(dur||0.3));o.connect(g);g.connect(actx.destination);o.start(now+i*0.08);o.stop(now+i*0.08+(dur||0.35))}}catch(e){}}

function getPresetsHTML(){var h='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn bsm bp" onclick="togCr()" style="font-size:9px;padding:6px 12px">+ CREATE</button></div>';h+='<div id="cr-box" style="display:none" class="cbox"><div class="ctitle"><span>CREATE PRESET</span><span style="cursor:pointer;color:#F43F5E" onclick="closeCr()">&times;</span></div><input type="hidden" id="cr-id" value=""><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="ig" style="margin:0"><label class="il">Name</label><input class="if" id="cr-name" placeholder="e.g. Reading"></div><div class="ig" style="margin:0"><label class="il">中文名</label><input class="if" id="cr-cn" placeholder="e.g. 阅读"></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="ig" style="margin:0"><label class="il">Time(min)</label><input type="number" class="if" id="cr-time" placeholder="10"></div><div class="ig" style="margin:0"><label class="il">XP</label><input type="number" class="if" id="cr-xp" placeholder="10"></div><div class="ig" style="margin:0"><label class="il">Category</label><select class="if" id="cr-cat">';for(var i=1;i<CATS.length;i++)h+='<option value="'+CATS[i]+'">'+CATS[i]+'</option>';h+='</select></div></div><div class="ig"><label class="il">Color</label><div class="cpick" id="cr-cols"></div></div><button class="btn bp" onclick="saveCr()">Save</button></div><div class="fbar" id="p-fbar"></div><div id="p-list"></div>';return h}

function drawPresets(){var fb=document.getElementById("p-fbar");if(fb){var fh="";for(var i=0;i<CATS.length;i++)fh+='<button class="fbtn'+(CATS[i]===pFilter?" active":"")+'" onclick="setPF(\''+CATS[i]+'\')">'+CATS[i]+'</button>';fb.innerHTML=fh}var cp=document.getElementById("cr-cols");if(cp){var ch="";var cols=["#3B82F6","#8B5CF6","#F97316","#EAB308","#F43F5E","#10B981"];for(var i=0;i<cols.length;i++)ch+='<div class="cswatch'+(cols[i]===crColor?" sel":"")+'" style="background:'+cols[i]+'" onclick="pickCC(\''+cols[i]+'\',this)"></div>';cp.innerHTML=ch}var list=document.getElementById("p-list");if(!list)return;var all={};for(var k in MX)all[k]=MX[k];if(S.cp)for(var i=0;i<S.cp.length;i++)all[S.cp[i].en]=S.cp[i];var entries=[];for(var eng in all){var d=all[eng];if(pFilter!=="ALL"&&d.cat!==pFilter)continue;entries.push({en:eng,d:d})}var _co=["#F43F5E","#F97316","#EAB308","#10B981","#3B82F6","#8B5CF6"];entries.sort(function(a,b){var ai=_co.indexOf(a.d.color);var bi=_co.indexOf(b.d.color);if(ai<0)ai=99;if(bi<0)bi=99;return ai-bi});var html="";for(var e=0;e<entries.length;e++){var eng=entries[e].en;var d=entries[e].d;var ratio=(d.bx/d.bt).toFixed(1);html+='<div class="preset" style="position:relative;overflow:hidden;background:'+d.color+'14" onclick="addPlan(\''+eng+'\')"><div class="cb" style="height:32px;background:'+d.color+'"></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><div class="en" style="font-size:10px">'+eng+'</div><div class="st2">'+d.bt+'min · '+d.bx+'xp</div></div><div class="st2">'+d.cn+'</div></div><div style="display:flex;align-items:center;gap:6px"><div class="xpt">'+ratio+'x</div><div class="preset-acts" style="display:flex;gap:2px"><button style="background:0;border:0;color:var(--c4);font-size:11px;font-weight:700;cursor:pointer;padding:2px 4px" onclick="event.stopPropagation();editPreset(\''+eng+'\')">EDIT</button><button style="background:0;border:0;color:#F43F5E;font-size:14px;font-weight:700;cursor:point function setPF(c){pFilter=c;drawPresets()}function pickCC(c,el){crColor=c;el.parentElement.querySelectorAll(".cswatch").forEach(function(s){s.classList.remove("sel")});el.classList.add("sel")}
function togCr(){var b=document.getElementById("cr-box");if(b){if(b.style.display==="none"){b.style.display="block";clearCr()}else closeCr()}}function closeCr(){var b=document.getElementById("cr-box");if(b)b.style.display="none"}function clearCr(){document.getElementById("cr-id").value="";document.getElementById("cr-name").value="";document.getElementById("cr-cn").value="";document.getElementById("cr-time").value="";document.getElementById("cr-xp").value="";document.getElementById("cr-cat").value="INPUT";crColor="#3B82F6"}
async function saveCr(){var name=document.getElementById("cr-name").value.trim();var cn=document.getElementById("cr-cn").value.trim();var tm=parseInt(document.getElementById("cr-time").value)||10;var xp=parseInt(document.getElementById("cr-xp").value)||10;var cat=document.getElementById("cr-cat").value;if(!name){hud("Enter a name");return}await saveCustomTask({en:name,cn:cn,color:crColor,cat:cat,bt:tm,bx:xp,is_custom:true});MX[name]={cn:cn,cat:cat,color:crColor,bt:tm,bx:xp};closeCr();drawPresets()}
function editPreset(eng){var all={};for(var k in MX)all[k]=MX[k];if(S.cp)for(var i=0;i<S.cp.length;i++)all[S.cp[i].en]=S.cp[i];var d=all[eng];if(!d)return;togCr();document.getElementById("cr-box").style.display="block";document.getElementById("cr-id").value=eng;document.getElementById("cr-name").value=eng;document.getElementById("cr-cn").value=d.cn||"";document.getElementById("cr-time").value=d.bt;document.getElementById("cr-xp").value=d.bx;document.getElementById("cr-cat").value=d.cat;crColor=d.color;drawPresets()}

function addPlan(eng){var all={};for(var k in MX)all[k]=MX[k];if(S.cp)for(var i=0;i<S.cp.length;i++)all[S.cp[i].en]=S.cp[i];var d=all[eng];if(!d)return;var id="p"+Date.now();var m={id:id,en:eng,cn:d.cn,color:d.color,cat:d.cat,bt:d.bt,bx:d.bx,dur:d.bt,cnt:1};if(!S.pm)S.pm=[];S.pm.unshift(m);savePlanningMission(m);drawPlan();if(window.innerWidth<768)expandAp("planner",2)}
function drawPlan(){var list=document.getElementById("pl-list");if(!list)return;var btn=document.getElementById("dep-all");if(btn)btn.style.display="none";var tasks=S.pm||[];if(!tasks.length){list.innerHTML='<div class="emp">[ EMPTY ]<span class="emps">Tap presets to add</span></div>';return}if(btn)btn.style.display="block";var html="";for(var i=0;i<tasks.length;i++){var t=tasks[i];var xp=cxp(t);html+='<div class="pcard"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:6px"><div class="cb" style="height:16px;background:'+t.color+'"></div><div><div class="en" style="font-size:10px">'+t.en+'</div><div class="st2">'+t.cn+' // '+t.cat+'</div></div></div><button style="background:0;border:0;color:var(--text3);font-size:16px;cursor:pointer" onclick="rmPlan(\''+t.id+'\')">&times;</button></div><div class="prow"><div class="pbox"><div class="plbl">DURATION</div><div class="pctrl"><button class="pbtn" onclick="adjD(\''+t.id+'\',-5)">-5</button><input class="pval" type="number" value="'+t.dur+'" onchange="setD(\''+t.id+'\',this.value)"><button class="pbtn" onclick="adjD(\''+t.id+'\',5)">+5</button></div></div><div class="pbox"><div class="plbl">SESSIONS</div><div class="pctrl"><button class="pbtn" onclick="adjC(\''+t.id+'\',-1)">-1</button><span class="pval" style="cursor:default">'+t.cnt+'</span><button class="pbtn" onclick="adjC(\''+t.id+'\',1)">+1</button></div></div></div><div class="pfoot"><div><span style="font-size:8px;color:var(--text3);font-weight:700;letter-spacing:.08em">PRO-RATA</span><br><span style="font-size:13px;font-weight:800;color:var(--accent2)">'+xp+' XP/RUN</span></div><button class="bg" style="background:'+t.color+';width:auto;padding:8px 16px" onclick="depOne(\''+t.id+'\')">DEPLOY</button></div></div>'}list.innerHTML=html}
function adjD(id,a){var t=findPM(id);if(t){t.dur=Math.max(5,t.dur+a);savePlanningMission(t);drawPlan()}}function setD(id,v){var t=findPM(id);if(t){t.dur=Math.max(5,parseInt(v)||t.bt);savePlanningMission(t);drawPlan()}}function adjC(id,a){var t=findPM(id);if(t){t.cnt=Math.max(1,t.cnt+a);savePlanningMission(t);drawPlan()}}function rmPlan(id){S.pm=(S.pm||[]).filter(function(t){return t.id!==id});deletePlanningMission(id);drawPlan()}function findPM(id){if(!S.pm)return null;for(var i=0;i<S.pm.length;i++)if(S.pm[i].id===id)return S.pm[i];return null}
function depOne(id){var idx=-1;if(S.pm)for(var i=0;i<S.pm.length;i++)if(S.pm[i].id===id){idx=i;break}if(idx===-1)return;var t=S.pm[idx];var tm={id:"t"+Date.now(),en:t.en,cn:t.cn,color:t.color,cat:t.cat,bt:t.bt,bx:t.bx,dur:t.dur,tgt:t.cnt,rem:t.cnt,done:false};S.tm.push(tm);saveTodayMission(tm);S.pm.splice(idx,1);deletePlanningMission(id);drawPlan();drawActive()}
function depAll(){if(!S.pm)return;for(var i=0;i<S.pm.length;i++){var t=S.pm[i];var tm={id:"t"+Date.now()+i,en:t.en,cn:t.cn,color:t.color,cat:t.cat,bt:t.bt,bx:t.bx,dur:t.dur,tgt:t.cnt,rem:t.cnt,done:false};S.tm.push(tm);saveTodayMission(tm)}var ids=[];for(var i=0;i<S.pm.length;i++)ids.push(S.pm[i].id);S.pm=[];for(var i=0;i<ids.length;i++)deletePlanningMission(ids[i]);drawPlan();drawActive()}

function drawActive(){var list=document.getElementById("p-active");if(!list)return;var active=[],closed=[];if(S.tm){for(var i=0;i<S.tm.length;i++){if(S.tm[i].done)closed.push(S.tm[i]);else active.push(S.tm[i])}}if(!active.length)list.innerHTML='<div class="emp">[ NO_MISSIONS ]<span class="emps">Go to 02 → DEPLOY</span></div>';else{var html="";for(var i=0;i<active.length;i++){var t=active[i];var xp=cxp(t);var rem=t.rem!==undefined?t.rem:t.tgt;html+='<div class="mcard"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="display:flex;align-items:center;gap:8px"><div class="cb" style="height:32px;background:'+t.color+'"></div><div><div class="en">'+t.en+'</div><div class="st2">'+t.cn+' · '+t.dur+'min</div></div></div><div style="text-align:right"><div style="font-size:8px;color:var(--text3);font-weight:700;letter-spacing:.06em">SESSIONS</div><div class="en" style="font-size:12px">'+rem+'/'+t.tgt+'</div></div></div><div class="mfoot"><button class="bg" style="background:'+t.color+';flex:1" onclick="doCI(\''+t.id+'\')">DONE (+'+xp+' XP)</button><button style="background:0;border:0;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px" onclick="rmMission(\''+t.id+'\')">&times;</button></div></div>'}list.innerHTML=html}var cl=document.getElementById("p-closed");var ar=document.getElementById("p-archive");var todayClosed=[],archived=[];var tdStr=todayStr();for(var i=0;i<closed.length;i++){if(closed[i]._doneDate===tdStr||(!closed[i]._doneDate&&closed[i].done))todayClosed.push(closed[i]);else archived.push(closed[i])}if(cl){var ch="";var moodLbl=["","Exhausted","Meh","Nice!","Happy!","Stoked!"];var effLbl=["","Barely","Okay","Solid!","Crushed!","Beast!"];for(var i=0;i<todayClosed.length;i++){var t=todayClosed[i];var ml=t._mood?moodLbl[t._mood]||"":"";var el_=t._eff?effLbl[t._eff]||"":"";var tag=ml+(el_?" · "+el_:"");ch+='<div class="ccard" style="flex-direction:column;align-items:flex-start;opacity:1;padding:10px 14px"><div style="display:flex;align-items:center;gap:6px;width:100%;justify-content:space-between"><div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0"><div class="cb" style="height:20px;background:'+t.color+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:10px;font-weight:700;color:var(--text);text-decoration:line-through;text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.en+'</div></div>'+(tag?'<div style="font-size:9px;font-weight:800;color:var(--text3);flex-shrink:0">'+tag+'</div>':'')+'</div><button style="background:0;border:0;color:#F43F5E;font-size:14px;cursor:pointer;flex-shrink:0;padding:0 0 0 6px" onclick="rmMission(\''+t.id+'\')">&times;</button></div>'+(t._note?'<div style="font-size:10px;color:var(--text2);margin-top:4px;padding-left:16px;font-style:italic;line-height:1.4">'+t._note+'</div>':'')+'</div>'}if(!todayClosed.length)ch='<div style="font-size:10px;color:var(--text3);font-weight:700;text-align:center;padding:12px">No completed missions today</div>';cl.innerHTML=ch}if(ar){if(archived.length){archived.sort(function(a,b){return (b._doneDate||"").localeCompare(a._doneDate||"")});var ah='<div style="font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.06em;margin-bottom:8px;cursor:pointer" onclick="document.getElementById(\'arc-list\').style.display=document.getElementById(\'arc-list\').style.display===\'none\'?\'block\':\'none\'">HISTORY ('+archived.length+') ▾</div>';ah+='<div id="arc-list" style="display:none">';var moodLbl=["","Exhausted","Meh","Nice!","Happy!","Stoked!"];var effLbl=["","Barely","Okay","Solid!","Crushed!","Beast!"];var lastDate="";for(var i=0;i<archived.length;i++){var t=archived[i];var d=t._doneDate||"";if(d!==lastDate){lastDate=d;ah+='<div style="font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.06em;margin:10px 0 6px">'+d+'</div>'}var ml=t._mood?moodLbl[t._mood]||"":"";var el_=t._eff?effLbl[t._eff]||"":"";var tag=ml+(el_?" · "+el_:"");ah+='<div class="ccard" style="flex-direction:column;align-items:flex-start;opacity:.7;padding:8px 12px;margin-bottom:4px"><div style="display:flex;align-items:center;gap:6px;width:100%"><div class="cb" style="height:16px;background:'+t.color+';flex-shrink:0;opacity:.6"></div><div style="font-size:10px;font-weight:700;color:var(--text2);text-decoration:line-through;text-transform:uppercase;letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.en+'</div>'+(tag?'<div style="font-size:8px;font-weight:700;color:var(--text3)">'+tag+'</div>':'')+'</div>'+(t._note?'<div style="font-size:9px;color:var(--text3);margin-top:3px;padding-left:14px;font-style:italic">'+t._note+'</div>':'')+'</div>'}ah+='</div>';ar.innerHTML=ah}else{ar.innerHTML=""}}}
function rmMission(id){S.tm=(S.tm||[]).filter(function(t){return t.id!==id});deleteTodayMission(id);drawActive();drawWelcome()}

function doCI(id){if(!S.tm)return;var t=null;for(var i=0;i<S.tm.length;i++)if(S.tm[i].id===id){t=S.tm[i];break}if(!t)return;pendCI=t;document.getElementById("ci-pts").textContent=cxp(t);document.getElementById("ci-dur").textContent=t.dur+" min";document.getElementById("ci-note").value="";sM=0;sE=0;var btns=document.querySelectorAll("#ci-modal .tbtn");for(var i=0;i<btns.length;i++)btns[i].classList.remove("sel");document.getElementById("ci-modal").classList.add("on");initMoodEff()}
async function confirmCI(){if(!pendCI)return;var t=pendCI;var xp=cxp(t);var note=document.getElementById("ci-note").value;var rem=t.rem!==undefined?t.rem:t.tgt;addXP(xp);var log={en:t.en,cn:t.cn,color:t.color,cat:t.cat,date:todayStr(),dur:t.dur,pts:xp,note:note,mood:sM,eff:sE,ts:Date.now()};S.logs.unshift(log);saveLog(log);t.rem=rem-1;if(t.rem<=0){t.done=true;t._note=note;t._mood=sM;t._eff=sE;t._doneDate=todayStr();updateTodayMission(t.id,{rem:t.rem,done:t.done,_note:note,_mood:sM,_eff:sE,_doneDate:t._doneDate})}else{updateTodayMission(t.id,{rem:t.rem,done:t.done})}var dates=[];for(var i=0;i<S.logs.length;i++){var d=S.logs[i].date;if(dates.indexOf(d)===-1)dates.push(d)}dates.sort();dates.reverse();var streak=1;for(var i=1;i<dates.length;i++){var d1=new Date(dates[i-1]),d2=new Date(dates[i]);if((d1-d2)/864e5===1)streak++;else break}S.pr.streak=streak;if(!S.pr.maxSt)S.pr.maxSt=0;S.pr.maxSt=Math.max(S.pr.maxSt,streak);saveProfile();closeHUD("ci-modal");pendCI=null;snd([523,659,784],"sine",0.3);var so=document.getElementById("suc");document.getElementById("suc-pts").textContent="+"+xp+" XP";so.classList.add("on");setTimeout(function(){so.classList.remove("on")},1500);drawActive();drawWelcome();updXP();drawStats();checkMilestones()}

function initMoodEff(){var ml=["Exhausted","Meh","Nice!","Happy!","Stoked!"];var el=["Barely","Okay","Solid!","Crushed!","Beast!"];var md=document.getElementById("mood-btns");if(md){var h="";for(var i=0;i<5;i++)h+='<div class="tbtn" onclick="selM('+(i+1)+',this)">'+pxIcon(MOOD_PX[i])+'<div style="font-size:8px;margin-top:2px">'+ml[i]+'</div></div>';md.innerHTML=h}var ed=document.getElementById("eff-btns");if(ed){var h="";for(var i=0;i<5;i++)h+='<div class="tbtn" onclick="selE('+(i+1)+',this)">'+pxIcon(EFF_PX[i])+'<div style="font-size:8px;margin-top:2px">'+el[i]+'</div></div>';ed.innerHTML=h}}

var total=S.tm?S.tm.length:0;var dn=0;var totalMin=0,doneMin=0;if(S.tm)for(var i=0;i<S.tm.length;i++){if(S.tm[i].done){dn++;doneMin+=S.tm[i].dur}totalMin+=S.tm[i].dur}
var taskPct=total>0?Math.round(dn/total*100):0;var timePct=totalMin>0?Math.round(doneMin/totalMin*100):0;

function dayName(d){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getUTCDay()]}
function fmtTime(ts){var d=new Date(ts);var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return months[d.getMonth()]+' '+d.getDate()+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function drawAreaChart(data,chartData,maxVal){var canvas=document.getElementById("area-canvas");if(!canvas)return;var ctx=canvas.getContext("2d");var rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width-32;canvas.height=140;var w=canvas.width,h=canvas.height,pad=30;ctx.clearRect(0,0,w,h);ctx.strokeStyle="#E2E4EA";ctx.lineWidth=0.5;for(var i=0;i<=4;i++){var y=pad+(h-2*pad)*i/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke()}var pts=[];for(var i=0;i<data.length;i++){var x=pad+(w-2*pad)*i/Math.max(1,data.length-1);var y=h-pad-(h-2*pad)*(data[i]/maxVal);pts.push({x:x,y:y})}ctx.beginPath();ctx.moveTo(pts[0].x,h-pad);for(var i=0;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.lineTo(pts[pts.length-1].x,h-pad);ctx.closePath();var grad=ctx.createLinearGradient(0,pad,0,h-pad);grad.addColorStop(0,"rgba(234,179,8,0.2)");grad.addColorStop(1,"rgba(234,179,8,0.02)");ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.strokeStyle="#EAB308";ctx.lineWidth=2.5;ctx.stroke();ctx.fillStyle="#94A3B8";ctx.font="8px JetBrains Mono";ctx.textAlign="center";var step=Math.max(1,Math.floor(chartData.length/6));for(var i=0;i<chartData.length;i+=step){var x=pad+(w-2*pad)*i/Math.max(1,chartData.length-1);ctx.fillText(chartData[i].label,x,h-8)}}

/* SETTINGS */
function drawSettings(){var el=document.getElementById("ac-settings");if(!el)return;var p=S.pr;var av=p.av?'<img src="'+p.av+'">':p.name.charAt(0).toUpperCase();var html='<div class="pbar" onclick="openProf()"><div class="pav">'+av+'</div><div style="flex:1"><div style="font-size:16px;font-weight:800">'+p.name+'</div><div style="font-size:12px;color:var(--text2)">Tap to edit</div></div><div style="color:var(--text3);font-size:18px">&gt;</div></div>';html+='<div style="font-size:14px;font-weight:800;margin:16px 0 10px">Mysterious Box</div>';html+='<div class="scard"><div style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px">A Mysterious Box contains a surprise XP reward! Buy from Shop or earn free from milestones, then open from Inventory.</div></div>';html+='<div style="font-size:12px;font-weight:800;color:var(--accent);margin:12px 0 8px;letter-spacing:.04em">🏆 MILESTONES — How to earn FREE Boxes</div>';for(var i=0;i<MILESTONES.length;i++){var m=MILESTONES[i];var earned=S._earnedMs&&S._earnedMs.indexOf(m.id)>=0;html+='<div class="scard" style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;'+(earned?'background:#ECFDF5;border-color:#A7F3D0':'')+'"><div style="font-size:18px;flex-shrink:0">'+(earned?'✅':'🎯')+'</div><div style="flex:1"><div style="font-size:11px;font-weight:800;color:'+(earned?'#059669':'var(--text)')+'">'+m.desc+'</div><div style="font-size:10px;color:var(--text3);font-weight:600">'+m.sub+'</div></div><div style="font-size:10px;font-weight:700;color:'+(earned?'#10B981':'var(--accent)')+';flex-shrink:0">'+(earned?'EARNED':'1 BOX')+'</div></div>'}html+='<div style="font-size:14px;font-weight:800;color:#F43F5E;margin:20px 0 12px">Danger Zone</div>';html+='<button class="btn" style="background:#FEF2F2;color:#F43F5E;border:1px solid #FECACA" onclick="resetData()">Reset All Data</button>';el.innerHTML=html}

/* PROFILE */
function openProf(){document.getElementById("prof-name").value=S.pr.name;if(S.pr.av)document.getElementById("prof-av").src=S.pr.av;document.getElementById("prof-modal").classList.add("on")}
function onAvatar(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){S.pr.av=ev.target.result;document.getElementById("prof-av").src=ev.target.result;saveProfile();drawWelcome();drawSettings()};r.readAsDataURL(f)}
function saveProf(){var n=document.getElementById("prof-name").value.trim();if(n)S.pr.name=n;saveProfile();closeHUD("prof-modal");drawWelcome();drawSettings()}
async function resetData(){hud("Delete ALL data?",[{l:"RESET",s:"bp",f:async function(){await sb.from('check_logs').delete().neq('id',0);await sb.from('loot').delete().neq('id',0);await sb.from('planning_missions').delete().neq('id',0);await sb.from('today_missions').delete().neq('id',0);S.logs=[];S.loot=[];S.pm=[];S.tm=[];S.totalXp=0;S.spendableXp=0;await sb.from('profiles').update({total_xp:0,spendable_xp:0}).eq('id','default');location.reload()}},{l:"CANCEL",s:"bs",f:function(){}}],true)}

loadAll();
var hudEl=document.getElementById("hud");if(hudEl)hudEl.addEventListener("click",function(e){if(e.target===this)this.classList.remove("on")});
var ciEl=document.getElementById("ci-modal");if(ciEl)ciEl.addEventListener("click",function(e){if(e.target===this)this.classList.remove("on")});
var pmEl=document.getElementById("prof-modal");if(pmEl)pmEl.addEventListener("click",function(e){if(e.target===this)this.classList.remove("on")});
var rwEl=document.getElementById("add-rw-modal");if(rwEl)rwEl.addEventListener("click",function(e){if(e.target===this)this.classList.remove("on")});
var rdEl=document.getElementById("redeem-modal");if(rdEl)rdEl.addEventListener("click",function(e){if(e.target===this)this.classList.remove("on")});
</script>
